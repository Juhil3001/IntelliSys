<div class="card-surface p-4 sm:p-5 flex flex-col min-h-[260px]">
  <div class="flex items-start justify-between gap-3 mb-3">
    <div>
      <h2 class="text-sm font-medium text-is-text">Response latency</h2>
      <p class="text-xs text-is-muted mt-0.5">7-day view · mock series</p>
    </div>
  </div>
  @if (loading()) {
    <div class="flex-1 min-h-[200px] rounded-lg bg-zinc-500/5 animate-skeleton border border-zinc-500/10"></div>
  } @else {
    <div class="flex-1 min-h-[200px] w-full min-w-0">
      <canvas #canvas class="!w-full !h-full max-h-[240px]"></canvas>
    </div>
  }
</div>
