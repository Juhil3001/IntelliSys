<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Sign in</h1>
    <p class="auth-sub">IntelliSys — API monitoring</p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="auth-field">
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" class="auth-input" />
        <span class="err" *ngIf="form.controls.email.touched && form.controls.email.errors?.['email']">Valid email required</span>
        <span class="err" *ngIf="form.controls.email.touched && form.controls.email.errors?.['required']">Required</span>
      </label>
      <label class="auth-field">
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="current-password" class="auth-input" />
        <span class="err" *ngIf="form.controls.password.touched && form.controls.password.errors?.['required']">Required</span>
      </label>
      <p class="err" *ngIf="error">{{ error }}</p>
      <button type="submit" class="btn btn-primary auth-submit" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
    <p class="auth-foot">
      No account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
