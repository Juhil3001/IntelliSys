<div class="page">
  <h1 class="page-title">APIs</h1>

  <div class="surface empty-project" *ngIf="api.projectId() == null">
    <p class="text-muted" style="margin: 0">Select a project on the Dashboard to list discovered API routes for that workspace.</p>
  </div>

  <ng-container *ngIf="api.projectId() != null">
    <p class="text-muted" *ngIf="error">{{ error }}</p>
    <p class="text-muted" *ngIf="!error && !rows.length">No routes yet — run a scan on the dashboard.</p>
    <table *ngIf="rows.length">
      <thead>
        <tr>
          <th>ID</th>
          <th>Method</th>
          <th>Endpoint</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows">
          <td>{{ r.id }}</td>
          <td><code>{{ r.method }}</code></td>
          <td><code>{{ r.endpoint }}</code></td>
        </tr>
      </tbody>
    </table>
    <p style="margin-top: var(--space-4)">
      <button type="button" class="btn btn-primary" (click)="load()">Refresh</button>
    </p>
  </ng-container>
</div>
