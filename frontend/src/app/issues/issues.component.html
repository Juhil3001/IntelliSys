<h2>Issues</h2>
<p class="muted" *ngIf="error">{{ error }}</p>
<p class="muted" *ngIf="!error && !rows.length">No issues — run recompute on the dashboard after calls exist.</p>
<table *ngIf="rows.length">
  <thead>
    <tr>
      <th>Severity</th>
      <th>Type</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let r of rows">
      <td>{{ r.severity }}</td>
      <td><code>{{ r.type }}</code></td>
      <td>{{ r.description }}</td>
    </tr>
  </tbody>
</table>
<button type="button" class="primary" (click)="load()">Refresh</button>
