<div class="saas-root" [class.nav-open]="navOpen" [class.rail-wide]="sidebarExpanded">
  <button
    type="button"
    class="nav-toggle"
    (click)="toggleNav()"
    [attr.aria-label]="navOpen ? 'Close menu' : 'Open menu'"
    [attr.aria-expanded]="navOpen"
  >
    <span class="hamburger" aria-hidden="true"></span>
  </button>
  <div class="nav-backdrop" (click)="closeNav()" tabindex="-1" role="presentation"></div>
  <div class="saas-frame" [class.rail-wide]="sidebarExpanded">
    <aside class="icon-rail" (click)="$event.stopPropagation()" aria-label="App navigation">
      <div class="rail-head">
        <div class="rail-logo" title="IntelliSys" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"
              stroke="white"
              stroke-width="1.5"
              fill="none"
            />
            <path d="M9 12l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </div>
        <button
          type="button"
          class="rail-expand"
          (click)="toggleSidebarExpand()"
          [attr.aria-expanded]="sidebarExpanded"
          [attr.aria-label]="sidebarExpanded ? 'Collapse sidebar' : 'Expand sidebar to show names'"
        >
          <svg
            *ngIf="!sidebarExpanded"
            class="chev-ico"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path d="M9 5l6 7-6 7" />
          </svg>
          <svg
            *ngIf="sidebarExpanded"
            class="chev-ico"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path d="M15 5l-6 7 6 7" />
          </svg>
        </button>
      </div>

      <nav class="rail-group" aria-label="Product">
        <a routerLink="/dashboard" routerLinkActive="active" class="rail-link" (click)="closeNav()">
          <span class="rail-ic-wrap" aria-hidden="true"
            ><svg class="rail-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" /></svg
          ></span>
          <span class="rail-txt">Dashboard</span>
        </a>
        <a routerLink="/apis" routerLinkActive="active" class="rail-link" (click)="closeNav()">
          <span class="rail-ic-wrap" aria-hidden="true"
            ><svg class="rail-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path d="M4 12h2l1.5-4 2 8L12 4l2.5 10L17 8l1.5 4H20" /></svg
          ></span>
          <span class="rail-txt">APIs</span>
        </a>
        <a routerLink="/issues" routerLinkActive="active" class="rail-link" (click)="closeNav()">
          <span class="rail-ic-wrap" aria-hidden="true"
            ><svg class="rail-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <circle cx="12" cy="12" r="8" />
              <path d="M12 8v4l3 2" /></svg
          ></span>
          <span class="rail-txt">Issues</span>
        </a>
        <a routerLink="/alerts" routerLinkActive="active" class="rail-link" (click)="closeNav()">
          <span class="rail-ic-wrap" aria-hidden="true"
            ><svg class="rail-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path d="M12 4a4 4 0 0 0-4 4v2l-1 3h10l-1-3V8a4 4 0 0 0-4-4Z" />
              <path d="M9 17a3 3 0 0 0 6 0" /></svg
          ></span>
          <span class="rail-txt">Alerts</span>
        </a>
        <a routerLink="/projects" routerLinkActive="active" class="rail-link" (click)="closeNav()">
          <span class="rail-ic-wrap" aria-hidden="true"
            ><svg class="rail-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path d="M4 4h6v6H4V4zM14 4h6v6h-6V4zM4 14h6v6H4v-6zM16 16l-2 2h5v-5" /></svg
          ></span>
          <span class="rail-txt">Projects</span>
        </a>
        <a routerLink="/actions" routerLinkActive="active" class="rail-link" (click)="closeNav()">
          <span class="rail-ic-wrap" aria-hidden="true"
            ><svg class="rail-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path d="M5 3v4M19 3v4M5 11h14M5 7h8M5 19h4M19 19h-3" />
              <path d="M9 19l3-3 3 3" /></svg
          ></span>
          <span class="rail-txt">Actions</span>
        </a>
      </nav>
      <div class="rail-divider" role="separator"></div>
      <nav class="rail-group" aria-label="More">
        <a routerLink="/chat" routerLinkActive="active" class="rail-link" (click)="closeNav()">
          <span class="rail-ic-wrap" aria-hidden="true"
            ><svg class="rail-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <circle cx="5" cy="12" r="2" />
              <circle cx="12" cy="5" r="2" />
              <circle cx="19" cy="12" r="2" />
              <circle cx="12" cy="19" r="2" />
              <path d="M7 10l2-2M17 10l-2-2M7 14l2 2M17 14l-2 2" /></svg
          ></span>
          <span class="rail-txt">Chat</span>
        </a>
      </nav>
      <a routerLink="/settings" class="rail-link rail-settings" routerLinkActive="active" (click)="closeNav()">
        <span class="rail-ic-wrap" aria-hidden="true"
          ><svg class="rail-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.2.3.4.5.6.5H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"
            /></svg
        ></span>
        <span class="rail-txt">Settings</span>
      </a>
    </aside>
    <div class="saas-main">
      <header class="topbar">
        <div class="topbar-brand">
          <span class="brand-light">Intelli</span><span class="brand-accent">Sys</span>
        </div>
        <div class="topbar-search" role="search">
          <svg
            class="search-ico"
            viewBox="0 0 24 24"
            width="12"
            height="12"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="6" />
            <path d="M15.5 15.5L20 20" />
          </svg>
          <input
            type="search"
            class="search-input"
            placeholder="Search endpoints, alerts..."
            title="UI preview"
          />
        </div>
        <div class="topbar-actions">
          <button type="button" class="theme-btn" (click)="theme.toggle()" [attr.aria-label]="'Switch theme'">
            <span *ngIf="theme.theme() === 'dark'">Light</span>
            <span *ngIf="theme.theme() === 'light'">Dark</span>
          </button>
          <a routerLink="/alerts" class="bell-btn" title="Open alerts" (click)="closeNav()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path d="M12 4a4 4 0 0 0-4 4v2l-1 3h10l-1-3V8a4 4 0 0 0-4-4Z" />
              <path d="M9 17a3 3 0 0 0 6 0" />
            </svg>
            <span class="bell-badge" *ngIf="alertCount > 0">{{ alertCount > 9 ? '9+' : alertCount }}</span>
          </a>
          <div class="user-av" [title]="auth.user()?.email || 'Account'">{{ userInitials() }}</div>
        </div>
      </header>
      <div class="saas-content scroll-y-dark">
        <router-outlet />
      </div>
    </div>
  </div>
</div>
