# Render Blueprint: https://docs.render.com/infrastructure-as-code
# In the Render dashboard, link this repo and use "Apply render.yaml" or set your Web Service to match.
#
# CORS: do not pin CORS_ORIGINS in this file — each blueprint sync was overwriting the dashboard
# and breaking the live static site. Defaults + *.onrender.com regex are in app/core/config.py.
# For a custom domain, set CORS_ADDITIONAL_ORIGINS in the intellisys-api service on Render.
services:
  - type: web
    name: intellisys-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Render sets PORT; bind 0.0.0.0. Use the script if shell expansion of $PORT is finicky in the UI.
    startCommand: sh start-render.sh
    healthCheckPath: /health
    envVars:
      # Pin Python (Render defaults to 3.14+ for new services; match local 3.11)
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PYTHONPATH
        value: .
    # Add in the dashboard: DATABASE_URL, CORS_ADDITIONAL_ORIGINS (if custom domain), etc.

  # Angular static build: production build uses environment.prod.ts → intellisys API URL
  - type: web
    name: intellisys-web
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    # Path to built files, relative to repo root (not rootDir) — see Angular outputPath + browser
    staticPublishPath: ./frontend/dist/frontend/browser
    # Client-side routes (e.g. /login) must serve index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
